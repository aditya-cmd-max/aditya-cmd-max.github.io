                                    <div class="profile-name-section">
                                        <h1 class="profile-name">${this.escapeHtml(data.displayName) || 'User'}</h1>
                                        <div class="profile-badges">
                                            ${this.getBadges(data)}
                                            ${data.email === CONFIG.adminEmail ? `
                                                <span class="badge badge-admin">
                                                    <i class="fas fa-shield-alt"></i> Admin
                                                </span>
                                            ` : ''}
                                        </div>
                                    </div>
                                    
                                    <div class="profile-email">
                                        <i class="fas fa-envelope"></i> ${this.escapeHtml(data.email) || 'No email'}
                                    </div>
                                </div>
                                
                                <p class="profile-bio">${this.escapeHtml(data.bio) || 'No bio added yet.'}</p>
                                
                                <div class="profile-stats-grid">
                                    <div class="profile-stat">
                                        <div class="profile-stat-value">${data.streak || 0}</div>
                                        <div class="profile-stat-label">Streak</div>
                                    </div>
                                    <div class="profile-stat">
                                        <div class="profile-stat-value">${memberDays}</div>
                                        <div class="profile-stat-label">Days</div>
                                    </div>
                                    <div class="profile-stat">
                                        <div class="profile-stat-value">${data.totalLogins || 1}</div>
                                        <div class="profile-stat-label">Logins</div>
                                    </div>
                                </div>
                                
                                <div class="follow-stats">
                                    <div class="follow-stat" onclick="FollowManager.showFollowers()">
                                        <div class="follow-stat-value">${State.followersCount}</div>
                                        <div class="follow-stat-label">Followers</div>
                                    </div>
                                    <div class="follow-stat" onclick="FollowManager.showFollowing()">
                                        <div class="follow-stat-value">${State.followingCount}</div>
                                        <div class="follow-stat-label">Following</div>
                                    </div>
                                </div>
                                
                                <div class="profile-actions">
                                    ${State.isOwner ? `
                                        <button class="btn btn-primary" onclick="UIManager.showToast('Edit profile coming soon', 'info')">
                                            <i class="fas fa-edit"></i> Edit
                                        </button>
                                        <button class="btn btn-secondary" onclick="PrivacyManager.togglePrivacy()">
                                            <i class="fas fa-${data.isPublic ? 'eye' : 'eye-slash'}"></i>
                                            ${data.isPublic ? 'Make Private' : 'Make Public'}
                                        </button>
                                    ` : followButton}
                                    
                                    <button class="btn btn-secondary" onclick="ShareManager.openModal()">
                                        <i class="fas fa-share-alt"></i> Share
                                    </button>
                                    
                                    ${State.currentUser?.email === CONFIG.adminEmail && !State.isOwner ? `
                                        <button class="btn btn-secondary" onclick="AdminManager.openVerifyModal('${data.uid}', '${this.escapeHtml(data.displayName || 'User')}', '${verificationLevel}')">
                                            <i class="fas fa-shield-alt"></i> Manage
                                        </button>
                                    ` : ''}
                                </div>
                                
                                <div class="profile-meta">
                                    <span><i class="fas fa-clock"></i> Last active: ${lastActive}</span>
                                    <span><i class="fas fa-calendar"></i> Joined: ${this.formatDate(data.createdAt)}</span>
                                    ${verificationLevel !== 'none' ? `
                                        <span><i class="fas fa-check-circle"></i> Verified: ${this.formatDate(data.verifiedAt)}</span>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                Elements.contentArea.innerHTML = content;
            },
            
            getVerificationLevel(data) {
                if (data.verifiedLevel === 'premium') return 'premium';
                if (data.verifiedLevel === 'basic' || data.verified) return 'basic';
                return 'none';
            },
            
            getBadges(data) {
                const level = this.getVerificationLevel(data);
                if (level === 'premium') {
                    return '<span class="badge badge-premium"><i class="fas fa-crown"></i> Premium Verified</span>';
                }
                if (level === 'basic') {
                    return '<span class="badge badge-verified"><i class="fas fa-check-circle"></i> Verified</span>';
                }
                return '';
            },
            
            getAvatarBadge(data) {
                const level = this.getVerificationLevel(data);
                if (level === 'premium') {
                    return '<div class="profile-avatar-badge profile-avatar-badge-premium"><i class="fas fa-crown"></i></div>';
                }
                if (level === 'basic') {
                    return '<div class="profile-avatar-badge profile-avatar-badge-verified"><i class="fas fa-check"></i></div>';
                }
                return '';
            },
            
            getAvatarUrl(user) {
                if (user.photoURL && !user.photoURL.includes('ui-avatars.com')) {
                    return user.photoURL;
                }
                return `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'User')}&background=1a73e8&color=fff&bold=true&size=400`;
            },
            
            calculateMemberDays(createdAt) {
                if (!createdAt) return 0;
                const date = createdAt.seconds ? new Date(createdAt.seconds * 1000) : new Date(createdAt);
                return Math.floor((new Date() - date) / (1000 * 60 * 60 * 24));
            },
            
            formatDate(date) {
                if (!date) return 'Unknown';
                try {
                    const d = date.seconds ? new Date(date.seconds * 1000) : new Date(date);
                    return d.toLocaleDateString('en-US', { 
                        year: 'numeric', 
                        month: 'short', 
                        day: 'numeric' 
                    });
                } catch {
                    return 'Unknown';
                }
            },
            
            formatLastActive(date) {
                if (!date) return 'Never';
                try {
                    const last = date.seconds ? new Date(date.seconds * 1000) : new Date(date);
                    const now = new Date();
                    const diff = Math.floor((now - last) / 60000);
                    
                    if (diff < 1) return 'Just now';
                    if (diff < 60) return `${diff}m ago`;
                    if (diff < 1440) return `${Math.floor(diff / 60)}h ago`;
                    if (diff < 10080) return `${Math.floor(diff / 1440)}d ago`;
                    return this.formatDate(date);
                } catch {
                    return 'Unknown';
                }
            },
            
            escapeHtml(text) {
                if (!text) return text;
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },
            
            isAdmin() {
                return State.currentUser?.email === CONFIG.adminEmail;
            },
            
            async updateLastActive() {
                if (!State.isOwner || !State.profileData) return;
                try {
                    await db.collection('users').doc(State.profileData.uid).update({
                        lastActive: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (error) {
                    console.error('Error updating last active:', error);
                }
            }
        };

        // ==================== FOLLOW MANAGER ====================
        const FollowManager = {
            async loadProfileFollowData(userId) {
                try {
                    const [followersSnap, followingSnap] = await Promise.all([
                        db.collection('followers').where('followingId', '==', userId).get(),
                        db.collection('followers').where('followerId', '==', userId).get()
                    ]);
                    
                    State.followersCount = followersSnap.size;
                    State.followingCount = followingSnap.size;
                    
                } catch (error) {
                    console.error('Error loading follow data:', error);
                }
            },
            
            async checkFollowStatus(followerId, followingId) {
                try {
                    const snapshot = await db.collection('followers')
                        .where('followerId', '==', followerId)
                        .where('followingId', '==', followingId)
                        .get();
                    return !snapshot.empty;
                } catch (error) {
                    console.error('Error checking follow:', error);
                    return false;
                }
            },
            
            async toggleFollow() {
                if (State.isFollowLoading) return;
                
                if (!State.currentUser) {
                    UIManager.showToast('Please sign in to follow users', 'info');
                    return;
                }
                
                if (State.isOwner) {
                    UIManager.showToast('You cannot follow yourself', 'warning');
                    return;
                }
                
                State.isFollowLoading = true;
                this.updateFollowButton(true);
                
                const followerId = State.currentUser.uid;
                const followingId = State.profileOwner;
                
                try {
                    if (State.isFollowing) {
                        await this.unfollow(followerId, followingId);
                    } else {
                        await this.follow(followerId, followingId);
                    }
                    
                    await this.loadProfileFollowData(followingId);
                    
                } catch (error) {
                    console.error('Follow error:', error);
                    UIManager.showToast('Error updating follow: ' + error.message, 'error');
                } finally {
                    State.isFollowLoading = false;
                    this.updateFollowButton(false);
                }
            },
            
            async follow(followerId, followingId) {
                // Check if already following
                const existing = await db.collection('followers')
                    .where('followerId', '==', followerId)
                    .where('followingId', '==', followingId)
                    .get();
                
                if (!existing.empty) {
                    throw new Error('Already following this user');
                }
                
                // Create follow document
                await db.collection('followers').add({
                    followerId,
                    followingId,
                    followerName: State.currentUserProfile?.displayName || State.currentUser.email,
                    followingName: State.profileData.displayName || 'User',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Update counts
                await Promise.all([
                    db.collection('users').doc(followingId).update({
                        followersCount: firebase.firestore.FieldValue.increment(1)
                    }),
                    db.collection('users').doc(followerId).update({
                        followingCount: firebase.firestore.FieldValue.increment(1)
                    })
                ]);
                
                State.isFollowing = true;
                UIManager.showToast(`You are now following ${State.profileData.displayName || 'this user'}`);
            },
            
            async unfollow(followerId, followingId) {
                const snapshot = await db.collection('followers')
                    .where('followerId', '==', followerId)
                    .where('followingId', '==', followingId)
                    .get();
                
                if (snapshot.empty) {
                    throw new Error('Not following this user');
                }
                
                const batch = db.batch();
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                
                await Promise.all([
                    db.collection('users').doc(followingId).update({
                        followersCount: firebase.firestore.FieldValue.increment(-1)
                    }),
                    db.collection('users').doc(followerId).update({
                        followingCount: firebase.firestore.FieldValue.increment(-1)
                    })
                ]);
                
                State.isFollowing = false;
                UIManager.showToast(`Unfollowed ${State.profileData.displayName || 'this user'}`);
            },
            
            updateFollowButton(loading) {
                const btn = document.getElementById('followBtn');
                if (btn) {
                    btn.disabled = loading;
                    btn.innerHTML = loading ? 
                        '<i class="fas fa-spinner fa-spin"></i> Processing...' : 
                        (State.isFollowing ? 
                            '<i class="fas fa-user-check"></i> Following' : 
                            '<i class="fas fa-user-plus"></i> Follow');
                    btn.className = `btn ${State.isFollowing ? 'btn-success' : 'btn-primary'}`;
                }
            },
            
            async showFollowers() {
                if (!State.profileData) return;
                
                Elements.followersModalTitle.textContent = `People following ${State.profileData.displayName || 'this user'}`;
                Elements.followersList.innerHTML = '<div class="modal-empty"><div class="spinner-sm"></div><p>Loading...</p></div>';
                Elements.followersModal.classList.add('active');
                
                try {
                    const snapshot = await db.collection('followers')
                        .where('followingId', '==', State.profileOwner)
                        .get();
                    
                    if (snapshot.empty) {
                        Elements.followersList.innerHTML = '<div class="modal-empty"><i class="fas fa-users"></i><p>No followers yet</p></div>';
                        return;
                    }
                    
                    const followerIds = snapshot.docs.map(doc => doc.data().followerId);
                    const followers = await this.getUserProfiles(followerIds);
                    
                    if (followers.length === 0) {
                        Elements.followersList.innerHTML = '<div class="modal-empty"><i class="fas fa-users"></i><p>No followers found</p></div>';
                        return;
                    }
                    
                    Elements.followersList.innerHTML = followers.map(user => `
                        <div class="modal-user-item" onclick="UserManager.viewProfile('${user.uid}')">
                            <img src="${ProfileManager.getAvatarUrl(user)}" class="modal-user-avatar">
                            <div class="modal-user-info">
                                <div class="modal-user-name">
                                    ${user.displayName || 'User'}
                                    ${ProfileManager.getBadges(user)}
                                </div>
                                <div class="modal-user-email">${user.email || ''}</div>
                            </div>
                        </div>
                    `).join('');
                    
                } catch (error) {
                    console.error('Error loading followers:', error);
                    Elements.followersList.innerHTML = '<div class="modal-empty text-error"><i class="fas fa-exclamation-circle"></i><p>Error loading followers</p></div>';
                }
            },
            
            async showFollowing() {
                if (!State.profileData) return;
                
                Elements.followingModalTitle.textContent = `People ${State.profileData.displayName || 'this user'} follows`;
                Elements.followingList.innerHTML = '<div class="modal-empty"><div class="spinner-sm"></div><p>Loading...</p></div>';
                Elements.followingModal.classList.add('active');
                
                try {
                    const snapshot = await db.collection('followers')
                        .where('followerId', '==', State.profileOwner)
                        .get();
                    
                    if (snapshot.empty) {
                        Elements.followingList.innerHTML = '<div class="modal-empty"><i class="fas fa-user-friends"></i><p>Not following anyone yet</p></div>';
                        return;
                    }
                    
                    const followingIds = snapshot.docs.map(doc => doc.data().followingId);
                    const following = await this.getUserProfiles(followingIds);
                    
                    if (following.length === 0) {
                        Elements.followingList.innerHTML = '<div class="modal-empty"><i class="fas fa-user-friends"></i><p>No followed users found</p></div>';
                        return;
                    }
                    
                    Elements.followingList.innerHTML = following.map(user => `
                        <div class="modal-user-item" onclick="UserManager.viewProfile('${user.uid}')">
                            <img src="${ProfileManager.getAvatarUrl(user)}" class="modal-user-avatar">
                            <div class="modal-user-info">
                                <div class="modal-user-name">
                                    ${user.displayName || 'User'}
                                    ${ProfileManager.getBadges(user)}
                                </div>
                                <div class="modal-user-email">${user.email || ''}</div>
                            </div>
                        </div>
                    `).join('');
                    
                } catch (error) {
                    console.error('Error loading following:', error);
                    Elements.followingList.innerHTML = '<div class="modal-empty text-error"><i class="fas fa-exclamation-circle"></i><p>Error loading following</p></div>';
                }
            },
            
            async getUserProfiles(userIds) {
                const profiles = [];
                for (let i = 0; i < userIds.length; i += CONFIG.batchSize) {
                    const batch = userIds.slice(i, i + CONFIG.batchSize);
                    const promises = batch.map(id => db.collection('users').doc(id).get());
                    const snapshots = await Promise.all(promises);
                    snapshots.forEach(snap => {
                        if (snap.exists) {
                            profiles.push({ uid: snap.id, ...snap.data() });
                        }
                    });
                }
                return profiles;
            }
        };

        // ==================== USER MANAGER ====================
        const UserManager = {
            async loadAllUsers() {
                try {
                    const snapshot = await db.collection('users').get();
                    State.allUsers = snapshot.docs.map(doc => ({
                        uid: doc.id,
                        ...doc.data()
                    }));
                    console.log(`📊 Loaded ${State.allUsers.length} users for search`);
                } catch (error) {
                    console.error('Error loading users:', error);
                    State.allUsers = [];
                }
            },
            
            viewProfile(userId) {
                window.location.href = `?id=${userId}`;
                Elements.searchResults.classList.remove('show');
                Elements.searchInput.value = '';
            }
        };

        // ==================== SEARCH MANAGER ====================
        const SearchManager = {
            search(query) {
                query = query.trim().toLowerCase();
                
                if (!query || query.length < 2) {
                    Elements.searchResults.classList.remove('show');
                    return;
                }
                
                Elements.searchResults.innerHTML = '<div class="search-loading"><div class="spinner-sm"></div><p>Searching...</p></div>';
                Elements.searchResults.classList.add('show');
                
                setTimeout(() => {
                    try {
                        const results = this.performSearch(query);
                        this.displayResults(results, query);
                    } catch (error) {
                        console.error('Search error:', error);
                        Elements.searchResults.innerHTML = '<div class="search-error">Error searching users</div>';
                    }
                }, 100);
            },
            
            performSearch(query) {
                return State.allUsers
                    .filter(user => {
                        if (!user.isPublic && user.uid !== State.currentUser?.uid) return false;
                        
                        const searchable = [
                            user.displayName,
                            user.email,
                            user.username
                        ].filter(Boolean).join(' ').toLowerCase();
                        
                        return searchable.includes(query);
                    })
                    .slice(0, CONFIG.maxSearchResults);
            },
            
            displayResults(results, query) {
                if (results.length === 0) {
                    Elements.searchResults.innerHTML = `<div class="search-no-results"><i class="fas fa-search"></i><p>No users found matching "${query}"</p></div>`;
                    return;
                }
                
                Elements.searchResults.innerHTML = results.map(user => `
                    <div class="search-result-item" onclick="UserManager.viewProfile('${user.uid}')">
                        <img src="${ProfileManager.getAvatarUrl(user)}" class="search-result-avatar">
                        <div class="search-result-info">
                            <div class="search-result-name">
                                ${user.displayName || 'User'}
                                ${ProfileManager.getBadges(user)}
                            </div>
                            <div class="search-result-email">${user.email || ''}</div>
                        </div>
                    </div>
                `).join('');
            }
        };

        // ==================== ADMIN MANAGER ====================
        const AdminManager = {
            async showPanel() {
                if (State.currentUser?.email !== CONFIG.adminEmail) {
                    UIManager.showToast('Admin access required', 'error');
                    return;
                }

                UIManager.showLoading(true);
                UIManager.hideAllSections();
                
                await UserManager.loadAllUsers();
                
                const stats = this.calculateStats();
                
                Elements.contentArea.innerHTML = `
                    <div class="admin-section">
                        <h2 class="section-title">Admin Verification Panel</h2>
                        
                        <div class="admin-stats">
                            <div class="stat-card">
                                <div class="stat-card-value">${stats.total}</div>
                                <div class="stat-card-label">Total Users</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-value">${stats.verified}</div>
                                <div class="stat-card-label">Verified</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-value">${stats.premium}</div>
                                <div class="stat-card-label">Premium</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-value">${stats.activeToday}</div>
                                <div class="stat-card-label">Active Today</div>
                            </div>
                        </div>
                        
                        <div class="admin-filters">
                            <button class="filter-btn active" onclick="AdminManager.filterUsers('all')">All Users</button>
                            <button class="filter-btn" onclick="AdminManager.filterUsers('verified')">Verified</button>
                            <button class="filter-btn" onclick="AdminManager.filterUsers('premium')">Premium</button>
                            <button class="filter-btn" onclick="AdminManager.filterUsers('unverified')">Unverified</button>
                        </div>
                        
                        <div class="users-list" id="usersList"></div>
                        
                        <div class="pagination">
                            <button class="pagination-btn" id="prevPage" onclick="AdminManager.changePage('prev')" disabled>
                                <i class="fas fa-chevron-left"></i> Previous
                            </button>
                            <span class="pagination-info" id="pageInfo">Page 1</span>
                            <button class="pagination-btn" id="nextPage" onclick="AdminManager.changePage('next')">
                                Next <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                `;
                
                this.filterUsers('all');
                UIManager.showLoading(false);
            },
            
            calculateStats() {
                const today = new Date().toDateString();
                return {
                    total: State.allUsers.length,
                    verified: State.allUsers.filter(u => u.verified === true || u.verifiedLevel === 'basic').length,
                    premium: State.allUsers.filter(u => u.verifiedLevel === 'premium').length,
                    activeToday: State.allUsers.filter(u => {
                        if (!u.lastActive) return false;
                        const last = u.lastActive.seconds ? new Date(u.lastActive.seconds * 1000) : new Date(u.lastActive);
                        return last.toDateString() === today;
                    }).length
                };
            },
            
            filterUsers(filter) {
                State.currentFilter = filter;
                
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.textContent.toLowerCase().includes(filter));
                });
                
                switch (filter) {
                    case 'verified':
                        State.filteredUsers = State.allUsers.filter(u => u.verified === true || u.verifiedLevel === 'basic');
                        break;
                    case 'premium':
                        State.filteredUsers = State.allUsers.filter(u => u.verifiedLevel === 'premium');
                        break;
                    case 'unverified':
                        State.filteredUsers = State.allUsers.filter(u => !u.verified && !u.verifiedLevel);
                        break;
                    default:
                        State.filteredUsers = [...State.allUsers];
                }
                
                State.currentPage = 1;
                this.renderUsers();
            },
            
            renderUsers() {
                const start = (State.currentPage - 1) * CONFIG.usersPerPage;
                const end = start + CONFIG.usersPerPage;
                const paginatedUsers = State.filteredUsers.slice(start, end);
                const totalPages = Math.ceil(State.filteredUsers.length / CONFIG.usersPerPage);
                
                const prevBtn = document.getElementById('prevPage');
                const nextBtn = document.getElementById('nextPage');
                const pageInfo = document.getElementById('pageInfo');
                
                if (prevBtn && nextBtn && pageInfo) {
                    prevBtn.disabled = State.currentPage === 1;
                    nextBtn.disabled = State.currentPage === totalPages || totalPages === 0;
                    pageInfo.textContent = `Page ${State.currentPage} of ${totalPages || 1}`;
                }
                
                const usersList = document.getElementById('usersList');
                if (!usersList) return;
                
                if (paginatedUsers.length === 0) {
                    usersList.innerHTML = '<div class="modal-empty"><i class="fas fa-users-slash"></i><p>No users found</p></div>';
                    return;
                }
                
                usersList.innerHTML = paginatedUsers.map(user => {
                    const level = ProfileManager.getVerificationLevel(user);
                    return `
                        <div class="user-row">
                            <div class="user-row-info">
                                <img src="${ProfileManager.getAvatarUrl(user)}" class="user-row-avatar">
                                <div class="user-row-details">
                                    <div class="user-row-name">
                                        ${user.displayName || 'User'}
                                        ${ProfileManager.getBadges(user)}
                                    </div>
                                    <div class="user-row-email">${user.email || ''}</div>
                                    <div class="user-row-meta">
                                        <span><i class="fas fa-users"></i> ${user.followersCount || 0} followers</span>
                                        <span><i class="fas fa-calendar"></i> Joined ${ProfileManager.formatDate(user.createdAt)}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="user-row-actions">
                                <button class="btn btn-icon btn-secondary" onclick="UserManager.viewProfile('${user.uid}')" title="View Profile">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn btn-icon btn-secondary" onclick="AdminManager.openVerifyModal('${user.uid}', '${user.displayName || 'User'}', '${level}')" title="Manage Verification">
                                    <i class="fas fa-${level === 'premium' ? 'crown' : 'shield-alt'}"></i>
                                </button>
                                ${user.email !== CONFIG.adminEmail ? `
                                    <button class="btn btn-icon btn-error" onclick="AdminManager.openDeleteModal('${user.uid}', '${user.displayName || 'User'}')" title="Delete User">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            },
            
            changePage(direction) {
                const totalPages = Math.ceil(State.filteredUsers.length / CONFIG.usersPerPage);
                
                if (direction === 'prev' && State.currentPage > 1) {
                    State.currentPage--;
                } else if (direction === 'next' && State.currentPage < totalPages) {
                    State.currentPage++;
                }
                
                this.renderUsers();
            },
            
            openVerifyModal(userId, userName, currentLevel) {
                State.selectedUserId = userId;
                State.isVerifying = false;
                
                Elements.modalUserInfo.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div style="width: 50px; height: 50px; background: var(--gradient-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.5rem;">
                            ${(userName || 'U').charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <h4>${userName}</h4>
                            <p class="text-tertiary" style="font-size: 0.85rem;">ID: ${userId}</p>
                            <p class="text-tertiary" style="font-size: 0.85rem;">Current: ${currentLevel === 'premium' ? 'Premium' : currentLevel === 'basic' ? 'Basic' : 'Not Verified'}</p>
                        </div>
                    </div>
                `;
                
                Elements.verifyLevel.value = currentLevel;
                Elements.verifyNotes.value = '';
                
                Elements.verifyModal.classList.add('active');
            },
            
            async saveVerification() {
                if (State.isVerifying) return;
                if (!State.selectedUserId) return;
                
                State.isVerifying = true;
                const btn = Elements.saveVerificationBtn;
                const originalText = btn.innerHTML;
                
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                
                const level = Elements.verifyLevel.value;
                const notes = Elements.verifyNotes.value;
                
                try {
                    console.log('Saving verification for:', State.selectedUserId, 'level:', level);
                    
                    const updateData = {
                        verifiedLevel: level === 'none' ? null : level,
                        verified: level !== 'none',
                        verifiedAt: level !== 'none' ? firebase.firestore.FieldValue.serverTimestamp() : null,
                        verifiedBy: level !== 'none' ? CONFIG.adminEmail : null,
                        verificationNotes: notes || null,
                        premiumVerified: level === 'premium',
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    await db.collection('users').doc(State.selectedUserId).update(updateData);
                    
                    UIManager.showToast(`User ${level === 'premium' ? 'Premium Verified' : level === 'basic' ? 'Verified' : 'Unverified'} successfully!`);
                    
                    // Refresh admin panel if open
                    if (Elements.contentArea.querySelector('.admin-section')) {
                        await UserManager.loadAllUsers();
                        this.filterUsers(State.currentFilter);
                    }
                    
                    // Refresh profile if viewing this user
                    if (State.profileData?.uid === State.selectedUserId) {
                        const doc = await db.collection('users').doc(State.selectedUserId).get();
                        State.profileData = { uid: doc.id, ...doc.data() };
                        ProfileManager.renderProfile();
                    }
                    
                    UIManager.closeModal('verifyModal');
                    
                } catch (error) {
                    console.error('Verification error:', error);
                    UIManager.showToast('Error updating verification: ' + error.message, 'error');
                } finally {
                    State.isVerifying = false;
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            },
            
            openDeleteModal(userId, userName) {
                State.selectedUserId = userId;
                State.isDeleting = false;
                Elements.deleteUserInfo.innerHTML = `<strong>User:</strong> ${userName}<br><strong>ID:</strong> ${userId}`;
                Elements.deleteModal.classList.add('active');
            },
            
            async confirmDelete() {
                if (State.isDeleting) return;
                if (!State.selectedUserId) return;
                
                State.isDeleting = true;
                const btn = document.querySelector('#deleteModal .btn-error');
                const originalText = btn.innerHTML;
                
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting...';
                
                try {
                    await db.collection('users').doc(State.selectedUserId).delete();
                    UIManager.showToast('User deleted successfully');
                    
                    if (Elements.contentArea.querySelector('.admin-section')) {
                        await UserManager.loadAllUsers();
                        this.filterUsers(State.currentFilter);
                    }
                    
                    UIManager.closeModal('deleteModal');
                    
                } catch (error) {
                    console.error('Delete error:', error);
                    UIManager.showToast('Error deleting user: ' + error.message, 'error');
                } finally {
                    State.isDeleting = false;
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            }
        };

        // ==================== AVATAR MANAGER ====================
        const AvatarManager = {
            handleUpload() {
                if (!State.currentUser) {
                    UIManager.showToast('Please sign in to upload', 'info');
                    return;
                }
                
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => this.upload(e.target.files[0]);
                input.click();
            },
            
            async upload(file) {
                if (!file || !State.currentUser) return;
                
                if (file.size > CONFIG.maxAvatarSize) {
                    UIManager.showToast('Image must be less than 5MB', 'error');
                    return;
                }
                
                if (!file.type.startsWith('image/')) {
                    UIManager.showToast('Please select an image file', 'error');
                    return;
                }
                
                UIManager.showToast('Uploading...', 'info');
                
                try {
                    // Convert to base64 (in production, use Cloudinary)
                    const reader = new FileReader();
                    
                    const result = await new Promise((resolve, reject) => {
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = () => reject(new Error('Failed to read file'));
                        reader.readAsDataURL(file);
                    });
                    
                    await db.collection('users').doc(State.currentUser.uid).update({
                        photoURL: result,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    UIManager.showToast('Profile picture updated!', 'success');
                    
                    // Refresh profile if viewing own profile
                    if (State.profileData?.uid === State.currentUser.uid) {
                        const doc = await db.collection('users').doc(State.currentUser.uid).get();
                        State.profileData = { uid: doc.id, ...doc.data() };
                        ProfileManager.renderProfile();
                    }
                    
                } catch (error) {
                    console.error('Upload error:', error);
                    UIManager.showToast('Error uploading image: ' + error.message, 'error');
                }
            }
        };

        // ==================== PRIVACY MANAGER ====================
        const PrivacyManager = {
            async togglePrivacy() {
                if (!State.isOwner || !State.profileData) return;
                
                try {
                    const newStatus = !State.profileData.isPublic;
                    
                    await db.collection('users').doc(State.profileData.uid).update({
                        isPublic: newStatus,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    State.profileData.isPublic = newStatus;
                    ProfileManager.renderProfile();
                    
                    UIManager.showToast(`Profile is now ${newStatus ? 'public' : 'private'}`);
                    
                } catch (error) {
                    console.error('Privacy error:', error);
                    UIManager.showToast('Error updating privacy: ' + error.message, 'error');
                }
            }
        };

        // ==================== SHARE MANAGER ====================
        const ShareManager = {
            openModal() {
                Elements.shareUrl.textContent = window.location.href;
                Elements.shareModal.classList.add('active');
            },
            
            async copyLink() {
                try {
                    await navigator.clipboard.writeText(Elements.shareUrl.textContent);
                    UIManager.showToast('Link copied to clipboard!');
                    UIManager.closeModal('shareModal');
                } catch (error) {
                    console.error('Copy error:', error);
                    UIManager.showToast('Failed to copy link', 'error');
                }
            },
            
            shareViaTwitter() {
                const url = encodeURIComponent(Elements.shareUrl.textContent);
                const text = encodeURIComponent('Check out this profile on Reverbit!');
                window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
            },
            
            shareViaFacebook() {
                const url = encodeURIComponent(Elements.shareUrl.textContent);
                window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
            },
            
            shareViaLinkedIn() {
                const url = encodeURIComponent(Elements.shareUrl.textContent);
                window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`, '_blank');
            }
        };

        // ==================== UI MANAGER ====================
        const UIManager = {
            showLoading(show) {
                Elements.loading.classList.toggle('hidden', !show);
                if (!show) Elements.mainContent.style.display = 'block';
            },
            
            hideAllSections() {
                Elements.contentArea.innerHTML = '';
            },
            
            showLanding() {
                Elements.contentArea.innerHTML = `
                    <div class="profile-section text-center">
                        <i class="fas fa-users" style="font-size: 5rem; color: var(--primary-500); margin-bottom: var(--space-6);"></i>
                        <h2 class="mb-4">Welcome to Reverbit</h2>
                        <p class="text-secondary mb-6" style="max-width: 500px; margin-left: auto; margin-right: auto;">
                            Sign in to view your profile, connect with others, and grow your network.
                        </p>
                        <div class="flex gap-3 justify-center">
                            <a href="https://aditya-cmd-max.github.io/signin" class="btn btn-primary">Sign In</a>
                            <a href="https://aditya-cmd-max.github.io/signup" class="btn btn-secondary">Sign Up</a>
                        </div>
                    </div>
                `;
            },
            
            showNotFound(message = 'Profile not found') {
                Elements.contentArea.innerHTML = `
                    <div class="not-found">
                        <i class="fas fa-user-slash not-found-icon"></i>
                        <h2 class="not-found-title">Profile Not Found</h2>
                        <p class="not-found-text">${message}</p>
                        <button class="btn btn-primary" onclick="window.location.href='/'">Go Home</button>
                    </div>
                `;
            },
            
            showToast(message, type = 'success') {
                if (State.toastTimeout) {
                    clearTimeout(State.toastTimeout);
                }
                
                Elements.toast.className = `toast toast-${type}`;
                Elements.toastMessage.textContent = message;
                Elements.toast.classList.add('show');
                
                State.toastTimeout = setTimeout(() => {
                    Elements.toast.classList.remove('show');
                }, 3000);
            },
            
            closeToast() {
                if (State.toastTimeout) {
                    clearTimeout(State.toastTimeout);
                }
                Elements.toast.classList.remove('show');
            },
            
            closeModal(modalId) {
                document.getElementById(modalId).classList.remove('active');
            },
            
            updateNav() {
                const isAdmin = State.currentUser?.email === CONFIG.adminEmail;
                
                Elements.nav.innerHTML = `
                    <button class="btn btn-icon btn-secondary" id="themeToggle" onclick="ThemeManager.toggle()" title="Toggle theme">
                        <i class="fas fa-${State.theme === 'dark' ? 'sun' : 'moon'}"></i>
                    </button>
                    ${State.currentUser ? `
                        <a href="?id=${State.currentUser.uid}" class="btn btn-primary hide-sm">
                            <i class="fas fa-user"></i> Profile
                        </a>
                        ${isAdmin ? `
                            <button class="btn btn-secondary hide-sm" onclick="AdminManager.showPanel()">
                                <i class="fas fa-shield-alt"></i> Admin
                            </button>
                        ` : ''}
                        <button class="btn btn-secondary" onclick="AuthManager.logout()" title="Logout">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    ` : `
                        <a href="https://aditya-cmd-max.github.io/signin" class="btn btn-secondary">Sign In</a>
                        <a href="https://aditya-cmd-max.github.io/signup" class="btn btn-primary">Sign Up</a>
                    `}
                `;
            }
        };

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Reverbit Profile initializing...');
            
            ThemeManager.init();
            
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
            
            // Load users for search
            UserManager.loadAllUsers();
            
            // Initialize auth
            AuthManager.init();

            // Search input
            Elements.searchInput.addEventListener('input', (e) => {
                clearTimeout(State.searchTimeout);
                State.searchTimeout = setTimeout(() => {
                    SearchManager.search(e.target.value);
                }, CONFIG.searchDebounceMs);
            });

            // Close search on outside click
            document.addEventListener('click', (e) => {
                if (!Elements.searchResults.contains(e.target) && !Elements.searchInput.contains(e.target)) {
                    Elements.searchResults.classList.remove('show');
                }
            });

            console.log('✅ Reverbit Profile initialized');
        });

        // ==================== GLOBAL FUNCTIONS ====================
        window.ThemeManager = ThemeManager;
        window.AuthManager = AuthManager;
        window.ProfileManager = ProfileManager;
        window.FollowManager = FollowManager;
        window.UserManager = UserManager;
        window.AdminManager = AdminManager;
        window.AvatarManager = AvatarManager;
        window.PrivacyManager = PrivacyManager;
        window.ShareManager = ShareManager;
        window.UIManager = UIManager;
        
        window.closeModal = (modalId) => UIManager.closeModal(modalId);
        window.closeToast = () => UIManager.closeToast();
        window.saveVerification = () => AdminManager.saveVerification();
        window.confirmDelete = () => AdminManager.confirmDelete();
        window.copyShareLink = () => ShareManager.copyLink();
        window.shareViaTwitter = () => ShareManager.shareViaTwitter();
        window.shareViaFacebook = () => ShareManager.shareViaFacebook();
        window.shareViaLinkedIn = () => ShareManager.shareViaLinkedIn();
    </script>
</body>
</html>
