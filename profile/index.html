                                    <div class="stat-card-value">${stats.activeToday}</div>
                                    <div class="stat-card-label">Active</div>
                                </div>
                            </div>
                            
                            <div class="admin-filters">
                                <button class="filter-btn active" onclick="window.AdminManager.filterUsers('all')">All</button>
                                <button class="filter-btn" onclick="window.AdminManager.filterUsers('verified')">Verified</button>
                                <button class="filter-btn" onclick="window.AdminManager.filterUsers('premium')">Premium</button>
                                <button class="filter-btn" onclick="window.AdminManager.filterUsers('unverified')">Unverified</button>
                            </div>
                            
                            <div class="users-list" id="usersList"></div>
                            
                            <div class="pagination">
                                <button class="pagination-btn" id="prevPage" onclick="window.AdminManager.changePage('prev')" disabled>Prev</button>
                                <span class="pagination-info" id="pageInfo">Page 1</span>
                                <button class="pagination-btn" id="nextPage" onclick="window.AdminManager.changePage('next')">Next</button>
                            </div>
                        </div>
                    `;
                    
                    this.filterUsers('all');
                    UIManager.showLoading(false);
                },
                
                calculateStats() {
                    const today = new Date().toDateString();
                    return {
                        total: State.allUsers.length,
                        verified: State.allUsers.filter(u => u.verified === true || u.verifiedLevel === 'basic').length,
                        premium: State.allUsers.filter(u => u.verifiedLevel === 'premium').length,
                        activeToday: State.allUsers.filter(u => {
                            if (!u.lastActive) return false;
                            try {
                                const last = u.lastActive.toDate ? u.lastActive.toDate() : new Date(u.lastActive);
                                return last.toDateString() === today;
                            } catch {
                                return false;
                            }
                        }).length
                    };
                },
                
                filterUsers(filter) {
                    State.currentFilter = filter;
                    
                    document.querySelectorAll('.filter-btn').forEach(btn => {
                        btn.classList.toggle('active', btn.textContent.toLowerCase().includes(filter));
                    });
                    
                    switch (filter) {
                        case 'verified':
                            State.filteredUsers = State.allUsers.filter(u => u.verified === true || u.verifiedLevel === 'basic');
                            break;
                        case 'premium':
                            State.filteredUsers = State.allUsers.filter(u => u.verifiedLevel === 'premium');
                            break;
                        case 'unverified':
                            State.filteredUsers = State.allUsers.filter(u => !u.verified && !u.verifiedLevel);
                            break;
                        default:
                            State.filteredUsers = [...State.allUsers];
                    }
                    
                    State.currentPage = 1;
                    this.renderUsers();
                },
                
                renderUsers() {
                    const start = (State.currentPage - 1) * USERS_PER_PAGE;
                    const end = start + USERS_PER_PAGE;
                    const paginatedUsers = State.filteredUsers.slice(start, end);
                    const totalPages = Math.ceil(State.filteredUsers.length / USERS_PER_PAGE);
                    
                    const prevBtn = document.getElementById('prevPage');
                    const nextBtn = document.getElementById('nextPage');
                    const pageInfo = document.getElementById('pageInfo');
                    
                    if (prevBtn && nextBtn && pageInfo) {
                        prevBtn.disabled = State.currentPage === 1;
                        nextBtn.disabled = State.currentPage === totalPages || totalPages === 0;
                        pageInfo.textContent = `Page ${State.currentPage} of ${totalPages || 1}`;
                    }
                    
                    const usersList = document.getElementById('usersList');
                    if (!usersList) return;
                    
                    if (paginatedUsers.length === 0) {
                        usersList.innerHTML = '<div class="text-center p-4">No users found</div>';
                        return;
                    }
                    
                    usersList.innerHTML = paginatedUsers.map(user => {
                        const level = ProfileManager.getVerificationLevel(user);
                        return `
                            <div class="user-row">
                                <div class="user-row-info">
                                    <img src="${ProfileManager.getAvatarUrl(user)}" class="user-row-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'User')}&background=1a73e8&color=fff'">
                                    <div class="user-row-details">
                                        <div class="user-row-name">
                                            ${user.displayName || 'User'}
                                            ${ProfileManager.getBadges(user)}
                                        </div>
                                        <div class="user-row-email">${user.email || ''}</div>
                                    </div>
                                </div>
                                <div class="user-row-actions">
                                    <button class="btn btn-icon btn-secondary" onclick="window.UserManager.viewProfile('${user.uid}')" title="View">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button class="btn btn-icon btn-secondary" onclick="window.AdminManager.openVerifyModal('${user.uid}', '${ProfileManager.escapeHtml(user.displayName || 'User')}', '${level}')" title="Verify">
                                        <i class="fas fa-${level === 'premium' ? 'crown' : 'shield-alt'}"></i>
                                    </button>
                                    ${user.email !== ADMIN_EMAIL ? `
                                        <button class="btn btn-icon btn-error" onclick="window.AdminManager.openDeleteModal('${user.uid}', '${ProfileManager.escapeHtml(user.displayName || 'User')}')" title="Delete">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                },
                
                changePage(direction) {
                    const totalPages = Math.ceil(State.filteredUsers.length / USERS_PER_PAGE);
                    
                    if (direction === 'prev' && State.currentPage > 1) {
                        State.currentPage--;
                    } else if (direction === 'next' && State.currentPage < totalPages) {
                        State.currentPage++;
                    }
                    
                    this.renderUsers();
                },
                
                openVerifyModal(userId, userName, currentLevel) {
                    State.selectedUserId = userId;
                    State.isVerifying = false;
                    
                    Elements.modalUserInfo.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div style="width: 50px; height: 50px; background: var(--gradient-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.5rem;">
                                ${(userName || 'U').charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h4>${userName}</h4>
                                <p class="text-tertiary">ID: ${userId}</p>
                                <p class="text-tertiary">Current: ${currentLevel === 'premium' ? 'Premium' : currentLevel === 'basic' ? 'Basic' : 'None'}</p>
                            </div>
                        </div>
                    `;
                    
                    Elements.verifyLevel.value = currentLevel;
                    Elements.verifyNotes.value = '';
                    
                    Elements.verifyModal.classList.add('active');
                },
                
                async saveVerification() {
                    if (State.isVerifying) return;
                    if (!State.selectedUserId) return;
                    
                    State.isVerifying = true;
                    const btn = Elements.saveVerificationBtn;
                    const originalText = btn.innerHTML;
                    
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                    
                    try {
                        const level = Elements.verifyLevel.value;
                        const notes = Elements.verifyNotes.value;
                        
                        const updateData = {
                            verifiedLevel: level === 'none' ? null : level,
                            verified: level !== 'none',
                            verifiedAt: level !== 'none' ? serverTimestamp() : null,
                            verifiedBy: level !== 'none' ? ADMIN_EMAIL : null,
                            verificationNotes: notes || null,
                            premiumVerified: level === 'premium',
                            updatedAt: serverTimestamp()
                        };
                        
                        const userRef = doc(db, 'users', State.selectedUserId);
                        await updateDoc(userRef, updateData);
                        
                        UIManager.showToast(`User ${level === 'premium' ? 'Premium Verified' : level === 'basic' ? 'Verified' : 'Unverified'}!`);
                        
                        // Refresh admin panel
                        if (Elements.contentArea.querySelector('.admin-section')) {
                            await UserManager.loadAllUsers();
                            this.filterUsers(State.currentFilter);
                        }
                        
                        // Refresh profile if viewing
                        if (State.profileData?.uid === State.selectedUserId) {
                            const docRef = doc(db, 'users', State.selectedUserId);
                            const docSnap = await getDoc(docRef);
                            State.profileData = { uid: docSnap.id, ...docSnap.data() };
                            ProfileManager.renderProfile();
                        }
                        
                        UIManager.closeModal('verifyModal');
                        
                    } catch (error) {
                        console.error('Verification error:', error);
                        UIManager.showToast('Error: ' + error.message, 'error');
                    } finally {
                        State.isVerifying = false;
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                    }
                },
                
                openDeleteModal(userId, userName) {
                    State.selectedUserId = userId;
                    State.isDeleting = false;
                    Elements.deleteUserInfo.innerHTML = `<strong>User:</strong> ${userName}<br><strong>ID:</strong> ${userId}`;
                    Elements.deleteModal.classList.add('active');
                },
                
                async confirmDelete() {
                    if (State.isDeleting) return;
                    if (!State.selectedUserId) return;
                    
                    State.isDeleting = true;
                    const btn = document.querySelector('#deleteModal .btn-error');
                    const originalText = btn.innerHTML;
                    
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting...';
                    
                    try {
                        const userRef = doc(db, 'users', State.selectedUserId);
                        await deleteDoc(userRef);
                        UIManager.showToast('User deleted');
                        
                        if (Elements.contentArea.querySelector('.admin-section')) {
                            await UserManager.loadAllUsers();
                            this.filterUsers(State.currentFilter);
                        }
                        
                        UIManager.closeModal('deleteModal');
                        
                    } catch (error) {
                        console.error('Delete error:', error);
                        UIManager.showToast('Error: ' + error.message, 'error');
                    } finally {
                        State.isDeleting = false;
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                    }
                }
            };

            // ==================== AVATAR MANAGER ====================
            const AvatarManager = {
                handleUpload() {
                    if (!State.currentUser) {
                        UIManager.showToast('Please sign in', 'info');
                        return;
                    }
                    
                    // Create file input
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.style.display = 'none';
                    
                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            this.upload(file);
                        }
                        document.body.removeChild(input);
                    };
                    
                    document.body.appendChild(input);
                    input.click();
                },
                
                async upload(file) {
                    if (!file || !State.currentUser) return;
                    
                    if (State.isUploading) {
                        UIManager.showToast('Upload already in progress', 'info');
                        return;
                    }
                    
                    const MAX_AVATAR_SIZE = 5 * 1024 * 1024; // 5MB
                    
                    if (file.size > MAX_AVATAR_SIZE) {
                        UIManager.showToast('Image too large (max 5MB)', 'error');
                        return;
                    }
                    
                    if (!file.type.startsWith('image/')) {
                        UIManager.showToast('Please select an image', 'error');
                        return;
                    }
                    
                    State.isUploading = true;
                    UIManager.showToast('Uploading...', 'info');
                    
                    try {
                        // Convert to base64
                        const base64 = await this.fileToBase64(file);
                        
                        // Update Firestore with the base64 image
                        const userRef = doc(db, 'users', State.currentUser.uid);
                        await updateDoc(userRef, {
                            photoURL: base64,
                            updatedAt: serverTimestamp()
                        });
                        
                        UIManager.showToast('Profile picture updated!', 'success');
                        
                        // Refresh profile
                        if (State.profileData?.uid === State.currentUser.uid) {
                            const docRef = doc(db, 'users', State.currentUser.uid);
                            const docSnap = await getDoc(docRef);
                            State.profileData = { uid: docSnap.id, ...docSnap.data() };
                            ProfileManager.renderProfile();
                        }
                        
                    } catch (error) {
                        console.error('Upload error:', error);
                        UIManager.showToast('Upload failed: ' + error.message, 'error');
                    } finally {
                        State.isUploading = false;
                    }
                },
                
                fileToBase64(file) {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = (error) => {
                            console.error('FileReader error:', error);
                            reject(new Error('Failed to read file'));
                        };
                    });
                }
            };

            // ==================== PRIVACY MANAGER ====================
            const PrivacyManager = {
                async togglePrivacy() {
                    if (!State.isOwner || !State.profileData) return;
                    
                    try {
                        const newStatus = !State.profileData.isPublic;
                        
                        const userRef = doc(db, 'users', State.profileData.uid);
                        await updateDoc(userRef, {
                            isPublic: newStatus,
                            updatedAt: serverTimestamp()
                        });
                        
                        State.profileData.isPublic = newStatus;
                        ProfileManager.renderProfile();
                        
                        UIManager.showToast(`Profile is now ${newStatus ? 'public' : 'private'}`);
                        
                    } catch (error) {
                        console.error('Privacy error:', error);
                        UIManager.showToast('Error updating privacy', 'error');
                    }
                }
            };

            // ==================== SHARE MANAGER ====================
            const ShareManager = {
                openModal() {
                    Elements.shareUrl.textContent = window.location.href;
                    Elements.shareModal.classList.add('active');
                },
                
                async copyLink() {
                    try {
                        await navigator.clipboard.writeText(Elements.shareUrl.textContent);
                        UIManager.showToast('Link copied!');
                        UIManager.closeModal('shareModal');
                    } catch (error) {
                        console.error('Copy error:', error);
                        UIManager.showToast('Failed to copy', 'error');
                    }
                },
                
                shareViaTwitter() {
                    const url = encodeURIComponent(Elements.shareUrl.textContent);
                    window.open(`https://twitter.com/intent/tweet?url=${url}`, '_blank');
                },
                
                shareViaFacebook() {
                    const url = encodeURIComponent(Elements.shareUrl.textContent);
                    window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
                },
                
                shareViaLinkedIn() {
                    const url = encodeURIComponent(Elements.shareUrl.textContent);
                    window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`, '_blank');
                }
            };

            // ==================== UI MANAGER ====================
            const UIManager = {
                showLoading(show) {
                    if (Elements.loading) {
                        Elements.loading.classList.toggle('hidden', !show);
                    }
                    // Always ensure main content is visible when loading is hidden
                    if (!show && Elements.mainContent) {
                        Elements.mainContent.style.display = 'block';
                    }
                },
                
                hideAllSections() {
                    if (Elements.contentArea) {
                        Elements.contentArea.innerHTML = '';
                    }
                },
                
                showLanding() {
                    if (!Elements.contentArea) return;
                    
                    Elements.contentArea.innerHTML = `
                        <div class="profile-section text-center">
                            <i class="fas fa-users" style="font-size: 5rem; color: var(--primary-500); margin-bottom: var(--space-6);"></i>
                            <h2 class="mb-4">Welcome to Reverbit</h2>
                            <p class="text-secondary mb-6">Sign in to view your profile and connect with others.</p>
                            <div class="flex gap-3 justify-center">
                                <a href="https://aditya-cmd-max.github.io/signin" class="btn btn-primary">Sign In</a>
                                <a href="https://aditya-cmd-max.github.io/signup" class="btn btn-secondary">Sign Up</a>
                            </div>
                        </div>
                    `;
                },
                
                showNotFound(message = 'Profile not found') {
                    if (!Elements.contentArea) return;
                    
                    Elements.contentArea.innerHTML = `
                        <div class="not-found">
                            <i class="fas fa-user-slash not-found-icon"></i>
                            <h2 class="not-found-title">Profile Not Found</h2>
                            <p class="not-found-text">${message}</p>
                            <button class="btn btn-primary" onclick="window.location.href='/'">Go Home</button>
                        </div>
                    `;
                },
                
                showToast(message, type = 'success') {
                    if (!Elements.toast || !Elements.toastMessage) return;
                    
                    if (State.toastTimeout) {
                        clearTimeout(State.toastTimeout);
                    }
                    
                    Elements.toast.className = `toast toast-${type}`;
                    Elements.toastMessage.textContent = message;
                    Elements.toast.classList.add('show');
                    
                    State.toastTimeout = setTimeout(() => {
                        Elements.toast.classList.remove('show');
                    }, 3000);
                },
                
                closeToast() {
                    if (State.toastTimeout) {
                        clearTimeout(State.toastTimeout);
                    }
                    if (Elements.toast) {
                        Elements.toast.classList.remove('show');
                    }
                },
                
                closeModal(modalId) {
                    const modal = document.getElementById(modalId);
                    if (modal) {
                        modal.classList.remove('active');
                    }
                },
                
                updateNav() {
                    if (!Elements.nav) return;
                    
                    const isAdmin = State.currentUser?.email === ADMIN_EMAIL;
                    
                    Elements.nav.innerHTML = `
                        <button class="btn btn-icon btn-secondary" id="themeToggle" onclick="window.ThemeManager.toggle()" title="Theme">
                            <i class="fas fa-${State.theme === 'dark' ? 'sun' : 'moon'}"></i>
                        </button>
                        ${State.currentUser ? `
                            <a href="?id=${State.currentUser.uid}" class="btn btn-primary">Profile</a>
                            ${isAdmin ? `
                                <button class="btn btn-secondary" onclick="window.AdminManager.showPanel()">Admin</button>
                            ` : ''}
                            <button class="btn btn-secondary" onclick="window.AuthManager.logout()">
                                <i class="fas fa-sign-out-alt"></i>
                            </button>
                        ` : `
                            <a href="https://aditya-cmd-max.github.io/signin" class="btn btn-secondary">Sign In</a>
                            <a href="https://aditya-cmd-max.github.io/signup" class="btn btn-primary">Sign Up</a>
                        `}
                    `;
                    
                    ThemeManager.updateNavIcon();
                }
            };

            // ==================== INITIALIZATION ====================
            document.addEventListener('DOMContentLoaded', () => {
                console.log('🚀 Reverbit Profile initializing...');
                
                // Initialize theme
                ThemeManager.init();

                // Initialize auth
                AuthManager.init();

                // Search input
                if (Elements.searchInput) {
                    Elements.searchInput.addEventListener('input', (e) => {
                        clearTimeout(State.searchTimeout);
                        State.searchTimeout = setTimeout(() => {
                            SearchManager.search(e.target.value);
                        }, SEARCH_DEBOUNCE_MS);
                    });
                }

                // Close search on outside click
                document.addEventListener('click', (e) => {
                    if (Elements.searchResults && Elements.searchInput && 
                        !Elements.searchResults.contains(e.target) && 
                        !Elements.searchInput.contains(e.target)) {
                        Elements.searchResults.classList.remove('show');
                    }
                });

                console.log('✅ Reverbit Profile initialized');
            });

            // ==================== EXPOSE GLOBALLY ====================
            window.ThemeManager = ThemeManager;
            window.AuthManager = AuthManager;
            window.ProfileManager = ProfileManager;
            window.FollowManager = FollowManager;
            window.UserManager = UserManager;
            window.AdminManager = AdminManager;
            window.AvatarManager = AvatarManager;
            window.PrivacyManager = PrivacyManager;
            window.ShareManager = ShareManager;
            window.UIManager = UIManager;

            // Modal functions
            window.closeModal = (modalId) => UIManager.closeModal(modalId);
            window.closeToast = () => UIManager.closeToast();
            window.saveVerification = () => AdminManager.saveVerification();
            window.confirmDelete = () => AdminManager.confirmDelete();
            window.copyShareLink = () => ShareManager.copyLink();
            window.shareViaTwitter = () => ShareManager.shareViaTwitter();
            window.shareViaFacebook = () => ShareManager.shareViaFacebook();
            window.shareViaLinkedIn = () => ShareManager.shareViaLinkedIn();

            console.log('🔥 Firebase initialized and ready');

        } catch (error) {
            console.error('❌ Fatal error initializing Firebase:', error);
            document.getElementById('loading').innerHTML = `
                <div class="text-error">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                    <h3>Failed to initialize</h3>
                    <p>${error.message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
