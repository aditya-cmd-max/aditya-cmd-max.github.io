    <script>
        // ==================== FIREBASE CONFIG ====================
        const CONFIG = {
            firebase: {
                apiKey: "AIzaSyDE0eix0uVHuUS5P5DbuPA-SZt6pD8ob8A",
                authDomain: "reverbit11.firebaseapp.com",
                projectId: "reverbit11",
                storageBucket: "reverbit11.firebasestorage.app",
                messagingSenderId: "607495314412",
                appId: "1:607495314412:web:8c098f88b0d3b4620f7ec9"
            },
            adminEmail: 'adityajha1104@gmail.com',
            usersPerPage: 20,
            searchDebounceMs: 300,
            maxSearchResults: 10,
            batchSize: 10,
            maxAvatarSize: 5 * 1024 * 1024 // 5MB
        };

        // ==================== INITIALIZE FIREBASE ====================
        firebase.initializeApp(CONFIG.firebase);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        // Enable persistence with error handling
        db.enablePersistence({ synchronizeTabs: true })
            .then(() => console.log('🔥 Firestore persistence enabled'))
            .catch(err => {
                if (err.code === 'failed-precondition') {
                    console.warn('Multiple tabs open, persistence disabled');
                } else if (err.code === 'unimplemented') {
                    console.warn('Browser doesn\'t support persistence');
                }
            });

        // ==================== STATE MANAGEMENT ====================
        const State = {
            _state: {
                currentUser: null,
                currentUserProfile: null,
                profileData: null,
                profileOwner: null,
                isOwner: false,
                isFollowing: false,
                isFollowLoading: false,
                followersCount: 0,
                followingCount: 0,
                allUsers: [],
                filteredUsers: [],
                currentPage: 1,
                selectedUserId: null,
                searchTimeout: null,
                currentFilter: 'all',
                theme: localStorage.getItem('theme') || 'light',
                isLoading: false,
                toastTimeout: null
            },
            
            _listeners: [],
            
            get(state) {
                return this._state[state];
            },
            
            set(state, value) {
                const oldValue = this._state[state];
                this._state[state] = value;
                this._notifyListeners(state, value, oldValue);
            },
            
            subscribe(listener) {
                this._listeners.push(listener);
                return () => {
                    this._listeners = this._listeners.filter(l => l !== listener);
                };
            },
            
            _notifyListeners(state, newValue, oldValue) {
                this._listeners.forEach(listener => {
                    try {
                        listener(state, newValue, oldValue);
                    } catch (error) {
                        console.error('Listener error:', error);
                    }
                });
            }
        };

        // ==================== DOM ELEMENTS ====================
        const Elements = {
            loading: document.getElementById('loading'),
            mainContent: document.getElementById('mainContent'),
            contentArea: document.getElementById('contentArea'),
            nav: document.getElementById('nav'),
            searchInput: document.getElementById('searchInput'),
            searchResults: document.getElementById('searchResults'),
            toast: document.getElementById('toast'),
            toastMessage: document.getElementById('toastMessage'),
            followersModal: document.getElementById('followersModal'),
            followingModal: document.getElementById('followingModal'),
            followersList: document.getElementById('followersList'),
            followingList: document.getElementById('followingList'),
            followersModalTitle: document.getElementById('followersModalTitle'),
            followingModalTitle: document.getElementById('followingModalTitle'),
            verifyModal: document.getElementById('verifyModal'),
            deleteModal: document.getElementById('deleteModal'),
            shareModal: document.getElementById('shareModal'),
            modalUserInfo: document.getElementById('modalUserInfo'),
            verifyLevel: document.getElementById('verifyLevel'),
            verifyNotes: document.getElementById('verifyNotes'),
            deleteUserInfo: document.getElementById('deleteUserInfo'),
            shareUrl: document.getElementById('shareUrl')
        };

        // ==================== THEME MANAGER ====================
        const ThemeManager = {
            init() {
                const theme = State.get('theme');
                this.apply(theme);
            },
            
            apply(theme) {
                document.body.className = theme === 'dark' ? 'dark-theme' : '';
                localStorage.setItem('theme', theme);
                State.set('theme', theme);
                this.updateThemeIcon();
            },
            
            toggle() {
                const newTheme = State.get('theme') === 'light' ? 'dark' : 'light';
                this.apply(newTheme);
                UIManager.showToast(`Theme switched to ${newTheme} mode`, 'info');
            },
            
            updateThemeIcon() {
                const icon = document.querySelector('#themeToggle i');
                if (icon) {
                    icon.className = State.get('theme') === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
                }
            }
        };

        // ==================== AUTH MANAGER ====================
        const AuthManager = {
            async init() {
                auth.onAuthStateChanged(user => this.handleAuthChange(user));
            },
            
            async handleAuthChange(user) {
                console.log('Auth state changed:', user ? user.email : 'No user');
                
                State.set('currentUser', user);
                
                if (user) {
                    await ProfileManager.loadUserProfile(user.uid);
                    await FollowManager.loadFollowData(user.uid);
                } else {
                    State.set('currentUserProfile', null);
                }
                
                UIManager.updateNavigation();
                
                const urlParams = new URLSearchParams(window.location.search);
                const userId = urlParams.get('id');
                
                if (userId) {
                    await ProfileManager.loadProfile(userId);
                } else if (user) {
                    window.location.href = `?id=${user.uid}`;
                } else {
                    UIManager.showLanding();
                }
                
                if (user) {
                    await UserManager.loadAllUsers();
                }
            },
            
            async logout() {
                try {
                    await auth.signOut();
                    UIManager.showToast('Logged out successfully', 'success');
                    window.location.href = 'https://aditya-cmd-max.github.io/signin';
                } catch (error) {
                    console.error('Logout error:', error);
                    UIManager.showToast('Error logging out', 'error');
                }
            }
        };

        // ==================== PROFILE MANAGER ====================
        const ProfileManager = {
            async loadUserProfile(uid) {
                try {
                    const doc = await db.collection('users').doc(uid).get();
                    
                    if (doc.exists) {
                        State.set('currentUserProfile', { uid: doc.id, ...doc.data() });
                    } else {
                        const profile = await this.createUserProfile(uid);
                        State.set('currentUserProfile', profile);
                    }
                } catch (error) {
                    console.error('Error loading user profile:', error);
                    UIManager.showToast('Error loading profile', 'error');
                }
            },
            
            async createUserProfile(uid) {
                const user = State.get('currentUser');
                const displayName = user.displayName || user.email.split('@')[0] || 'User';
                
                const profile = {
                    uid,
                    email: user.email,
                    displayName,
                    username: this.generateUsername(displayName),
                    photoURL: `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=1a73e8&color=fff&bold=true&size=400`,
                    bio: '',
                    isPublic: true,
                    verified: false,
                    verifiedLevel: 'none',
                    premiumVerified: false,
                    followersCount: 0,
                    followingCount: 0,
                    streak: 0,
                    totalLogins: 1,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastActive: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    theme: 'auto'
                };
                
                await db.collection('users').doc(uid).set(profile);
                return profile;
            },
            
            generateUsername(displayName) {
                return displayName.toLowerCase()
                    .replace(/[^a-z0-9]/g, '')
                    .substring(0, 15) + 
                    Math.random().toString(36).substring(2, 6);
            },
            
            async loadProfile(userId) {
                UIManager.showLoading(true);
                UIManager.hideAllSections();

                try {
                    const doc = await db.collection('users').doc(userId).get();
                    
                    if (!doc.exists) {
                        UIManager.showNotFound('Profile not found');
                        return;
                    }

                    const profileData = { uid: doc.id, ...doc.data() };
                    State.set('profileData', profileData);
                    State.set('profileOwner', userId);
                    
                    const currentUser = State.get('currentUser');
                    State.set('isOwner', currentUser && currentUser.uid === userId);

                    if (!profileData.isPublic && !State.get('isOwner')) {
                        UIManager.showNotFound('This profile is private');
                        return;
                    }

                    // Load follow data
                    await FollowManager.loadProfileFollowData(userId);
                    
                    // Check follow status
                    if (currentUser && !State.get('isOwner')) {
                        const isFollowing = await FollowManager.checkFollowStatus(currentUser.uid, userId);
                        State.set('isFollowing', isFollowing);
                    }

                    this.renderProfile(profileData);
                    
                    // Update last active if owner
                    if (State.get('isOwner')) {
                        await this.updateLastActive();
                    }

                } catch (error) {
                    console.error('Error loading profile:', error);
                    UIManager.showToast('Error loading profile', 'error');
                    UIManager.showNotFound();
                } finally {
                    UIManager.showLoading(false);
                }
            },
            
            renderProfile(data) {
                const memberDays = this.calculateMemberDays(data.createdAt);
                const lastActive = this.formatLastActive(data.lastActive);
                const verificationLevel = this.getVerificationLevel(data);
                const isOwner = State.get('isOwner');
                const isFollowing = State.get('isFollowing');
                const isFollowLoading = State.get('isFollowLoading');
                const currentUser = State.get('currentUser');

                const followButton = !isOwner && currentUser ? `
                    <button class="btn ${isFollowing ? 'btn-success' : 'btn-primary'}" 
                            id="followBtn" 
                            onclick="FollowManager.toggleFollow()"
                            ${isFollowLoading ? 'disabled' : ''}>
                        <i class="fas fa-${isFollowLoading ? 'spinner fa-spin' : (isFollowing ? 'user-check' : 'user-plus')}"></i>
                        ${isFollowLoading ? 'Processing...' : (isFollowing ? 'Following' : 'Follow')}
                    </button>
                ` : '';

                const content = `
                    <div class="profile-section">
                        <div class="profile-header">
                            <div class="profile-avatar-wrapper">
                                <div class="profile-avatar">
                                    <img src="${this.getAvatarUrl(data)}" alt="${data.displayName}" class="profile-avatar-img" 
                                         onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(data.displayName || 'User')}&background=1a73e8&color=fff&bold=true'">
                                    ${this.getAvatarBadge(data)}
                                    ${isOwner ? `
                                        <div class="avatar-overlay" onclick="AvatarManager.handleUpload()">
                                            <i class="fas fa-camera"></i>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                            
                            <div class="profile-info">
                                <div>
                                    <div class="profile-name-section">
                                        <h1 class="profile-name">${data.displayName || 'User'}</h1>
                                        <div class="profile-badges">
                                            ${this.getBadges(data)}
                                            ${data.email === CONFIG.adminEmail ? `
                                                <span class="badge badge-admin">
                                                    <i class="fas fa-shield-alt"></i> Admin
                                                </span>
                                            ` : ''}
                                        </div>
                                    </div>
                                    
                                    <div class="profile-email">
                                        <i class="fas fa-envelope"></i>
                                        ${data.email || 'No email'}
                                        ${data.emailVerified ? '<i class="fas fa-check-circle text-success" title="Email verified"></i>' : ''}
                                    </div>
                                </div>
                                
                                <p class="profile-bio">${data.bio || 'No bio added yet.'}</p>
                                
                                <div class="profile-stats-grid">
                                    <div class="profile-stat">
                                        <div class="profile-stat-value">${data.streak || 0}</div>
                                        <div class="profile-stat-label">Day Streak</div>
                                    </div>
                                    <div class="profile-stat">
                                        <div class="profile-stat-value">${memberDays}</div>
                                        <div class="profile-stat-label">Member Days</div>
                                    </div>
                                    <div class="profile-stat">
                                        <div class="profile-stat-value">${data.totalLogins || 1}</div>
                                        <div class="profile-stat-label">Total Logins</div>
                                    </div>
                                </div>
                                
                                <div class="follow-stats">
                                    <div class="follow-stat" onclick="FollowManager.showFollowers()">
                                        <div class="follow-stat-value">${State.get('followersCount')}</div>
                                        <div class="follow-stat-label">Followers</div>
                                    </div>
                                    <div class="follow-stat" onclick="FollowManager.showFollowing()">
                                        <div class="follow-stat-value">${State.get('followingCount')}</div>
                                        <div class="follow-stat-label">Following</div>
                                    </div>
                                </div>
                                
                                <div class="profile-actions">
                                    ${isOwner ? `
                                        <a href="#" class="btn btn-primary" onclick="ProfileManager.editProfile()">
                                            <i class="fas fa-edit"></i> Edit Profile
                                        </a>
                                        <button class="btn btn-secondary" onclick="PrivacyManager.togglePrivacy()">
                                            <i class="fas fa-${data.isPublic ? 'eye' : 'eye-slash'}"></i>
                                            ${data.isPublic ? 'Make Private' : 'Make Public'}
                                        </button>
                                    ` : followButton}
                                    
                                    <button class="btn btn-secondary" onclick="ShareManager.openModal()">
                                        <i class="fas fa-share-alt"></i> Share
                                    </button>
                                    
                                    ${currentUser?.email === CONFIG.adminEmail && !isOwner ? `
                                        <button class="btn btn-secondary" onclick="AdminManager.openVerifyModal('${data.uid}', '${data.displayName || 'User'}', '${verificationLevel}')">
                                            <i class="fas fa-shield-alt"></i> Manage
                                        </button>
                                    ` : ''}
                                </div>
                                
                                <div class="profile-meta">
                                    <span><i class="fas fa-clock"></i> Last active: ${lastActive}</span>
                                    <span><i class="fas fa-calendar"></i> Joined: ${this.formatDate(data.createdAt)}</span>
                                    ${verificationLevel !== 'none' ? `
                                        <span><i class="fas fa-check-circle"></i> Verified: ${this.formatDate(data.verifiedAt)}</span>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                Elements.contentArea.innerHTML = content;
            },
            
            getVerificationLevel(data) {
                if (data.verifiedLevel === 'premium') return 'premium';
                if (data.verifiedLevel === 'basic' || data.verified) return 'basic';
                return 'none';
            },
            
            getBadges(data) {
                const level = this.getVerificationLevel(data);
                
                if (level === 'premium') {
                    return `<span class="badge badge-premium"><i class="fas fa-crown"></i> Premium Verified</span>`;
                } else if (level === 'basic') {
                    return `<span class="badge badge-verified"><i class="fas fa-check-circle"></i> Verified</span>`;
                }
                return '';
            },
            
            getAvatarBadge(data) {
                const level = this.getVerificationLevel(data);
                
                if (level === 'premium') {
                    return `<div class="profile-avatar-badge profile-avatar-badge-premium"><i class="fas fa-crown"></i></div>`;
                } else if (level === 'basic') {
                    return `<div class="profile-avatar-badge profile-avatar-badge-verified"><i class="fas fa-check"></i></div>`;
                }
                return '';
            },
            
            getAvatarUrl(user) {
                if (user.photoURL) return user.photoURL;
                return `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'User')}&background=1a73e8&color=fff&bold=true&size=400`;
            },
            
            calculateMemberDays(createdAt) {
                if (!createdAt) return 0;
                const date = createdAt.seconds ? new Date(createdAt.seconds * 1000) : new Date(createdAt);
                const diff = new Date() - date;
                return Math.floor(diff / (1000 * 60 * 60 * 24));
            },
            
            formatDate(date) {
                if (!date) return 'Unknown';
                const d = date.seconds ? new Date(date.seconds * 1000) : new Date(date);
                return d.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
            },
            
            formatLastActive(date) {
                if (!date) return 'Never';
                
                const last = date.seconds ? new Date(date.seconds * 1000) : new Date(date);
                const now = new Date();
                const diff = Math.floor((now - last) / 60000);
                
                if (diff < 1) return 'Just now';
                if (diff < 60) return `${diff}m ago`;
                if (diff < 1440) return `${Math.floor(diff / 60)}h ago`;
                if (diff < 10080) return `${Math.floor(diff / 1440)}d ago`;
                return this.formatDate(date);
            },
            
            async updateLastActive() {
                if (!State.get('isOwner') || !State.get('profileData')) return;
                
                try {
                    await db.collection('users').doc(State.get('profileData').uid).update({
                        lastActive: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (error) {
                    console.error('Error updating last active:', error);
                }
            },
            
            editProfile() {
                UIManager.showToast('Edit profile coming soon', 'info');
            }
        };

        // ==================== FOLLOW MANAGER ====================
        const FollowManager = {
            async loadFollowData(uid) {
                try {
                    const [followersSnap, followingSnap] = await Promise.all([
                        db.collection('followers').where('followingId', '==', uid).get(),
                        db.collection('followers').where('followerId', '==', uid).get()
                    ]);
                    
                    State.set('followers', followersSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    State.set('following', followingSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    State.set('followersCount', followersSnap.size);
                    State.set('followingCount', followingSnap.size);
                    
                    // Update user document
                    await db.collection('users').doc(uid).update({
                        followersCount: followersSnap.size,
                        followingCount: followingSnap.size
                    });
                    
                } catch (error) {
                    console.error('Error loading follow data:', error);
                }
            },
            
            async loadProfileFollowData(userId) {
                try {
                    const [followersSnap, followingSnap] = await Promise.all([
                        db.collection('followers').where('followingId', '==', userId).get(),
                        db.collection('followers').where('followerId', '==', userId).get()
                    ]);
                    
                    State.set('followersCount', followersSnap.size);
                    State.set('followingCount', followingSnap.size);
                    
                } catch (error) {
                    console.error('Error loading profile follow data:', error);
                }
            },
            
            async checkFollowStatus(followerId, followingId) {
                try {
                    const snapshot = await db.collection('followers')
                        .where('followerId', '==', followerId)
                        .where('followingId', '==', followingId)
                        .get();
                    
                    return !snapshot.empty;
                } catch (error) {
                    console.error('Error checking follow status:', error);
                    return false;
                }
            },
            
            async toggleFollow() {
                if (State.get('isFollowLoading')) return;
                
                const currentUser = State.get('currentUser');
                if (!currentUser) {
                    UIManager.showToast('Please sign in to follow users', 'info');
                    return;
                }
                
                if (State.get('isOwner')) {
                    UIManager.showToast('You cannot follow yourself', 'warning');
                    return;
                }
                
                State.set('isFollowLoading', true);
                this.updateFollowButtonLoading(true);
                
                const followerId = currentUser.uid;
                const followingId = State.get('profileOwner');
                const isFollowing = State.get('isFollowing');
                
                try {
                    if (isFollowing) {
                        await this.unfollow(followerId, followingId);
                    } else {
                        await this.follow(followerId, followingId);
                    }
                    
                    await this.loadProfileFollowData(followingId);
                    
                } catch (error) {
                    console.error('Error toggling follow:', error);
                    UIManager.showToast('Error updating follow status', 'error');
                } finally {
                    State.set('isFollowLoading', false);
                    this.updateFollowButton();
                }
            },
            
            async follow(followerId, followingId) {
                await db.collection('followers').add({
                    followerId,
                    followingId,
                    followerName: State.get('currentUserProfile')?.displayName || State.get('currentUser').email,
                    followingName: State.get('profileData').displayName || 'User',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await Promise.all([
                    db.collection('users').doc(followingId).update({
                        followersCount: firebase.firestore.FieldValue.increment(1)
                    }),
                    db.collection('users').doc(followerId).update({
                        followingCount: firebase.firestore.FieldValue.increment(1)
                    })
                ]);
                
                State.set('isFollowing', true);
                UIManager.showToast(`You are now following ${State.get('profileData').displayName || 'user'}`);
            },
            
            async unfollow(followerId, followingId) {
                const snapshot = await db.collection('followers')
                    .where('followerId', '==', followerId)
                    .where('followingId', '==', followingId)
                    .get();
                
                const batch = db.batch();
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                
                await Promise.all([
                    db.collection('users').doc(followingId).update({
                        followersCount: firebase.firestore.FieldValue.increment(-1)
                    }),
                    db.collection('users').doc(followerId).update({
                        followingCount: firebase.firestore.FieldValue.increment(-1)
                    })
                ]);
                
                State.set('isFollowing', false);
                UIManager.showToast(`Unfollowed ${State.get('profileData').displayName || 'user'}`);
            },
            
            updateFollowButtonLoading(loading) {
                const btn = document.getElementById('followBtn');
                if (btn) {
                    btn.disabled = loading;
                    btn.innerHTML = loading ? 
                        '<i class="fas fa-spinner fa-spin"></i> Processing...' : 
                        (State.get('isFollowing') ? 
                            '<i class="fas fa-user-check"></i> Following' : 
                            '<i class="fas fa-user-plus"></i> Follow');
                }
            },
            
            updateFollowButton() {
                const btn = document.getElementById('followBtn');
                if (btn) {
                    btn.disabled = false;
                    btn.className = `btn ${State.get('isFollowing') ? 'btn-success' : 'btn-primary'}`;
                    btn.innerHTML = State.get('isFollowing') ? 
                        '<i class="fas fa-user-check"></i> Following' : 
                        '<i class="fas fa-user-plus"></i> Follow';
                }
            },
            
            async showFollowers() {
                const profileData = State.get('profileData');
                if (!profileData) return;
                
                Elements.followersModalTitle.textContent = `People following ${profileData.displayName || 'this user'}`;
                Elements.followersList.innerHTML = '<div class="modal-empty"><div class="spinner spinner-sm"></div><p>Loading...</p></div>';
                Elements.followersModal.classList.add('active');
                
                try {
                    const snapshot = await db.collection('followers')
                        .where('followingId', '==', State.get('profileOwner'))
                        .get();
                    
                    if (snapshot.empty) {
                        Elements.followersList.innerHTML = '<div class="modal-empty"><i class="fas fa-users"></i><p>No followers yet</p></div>';
                        return;
                    }
                    
                    const followerIds = snapshot.docs.map(doc => doc.data().followerId);
                    const followers = await this.getUserProfiles(followerIds);
                    
                    Elements.followersList.innerHTML = followers.map(user => `
                        <div class="modal-user-item" onclick="UserManager.viewProfile('${user.uid}')">
                            <img src="${ProfileManager.getAvatarUrl(user)}" alt="${user.displayName || 'User'}" class="modal-user-avatar">
                            <div class="modal-user-info">
                                <div class="modal-user-name">
                                    ${user.displayName || 'User'}
                                    ${ProfileManager.getBadges(user)}
                                </div>
                                <div class="modal-user-email">${user.email || ''}</div>
                            </div>
                        </div>
                    `).join('');
                    
                } catch (error) {
                    console.error('Error loading followers:', error);
                    Elements.followersList.innerHTML = '<div class="modal-empty text-error"><i class="fas fa-exclamation-circle"></i><p>Error loading followers</p></div>';
                }
            },
            
            async showFollowing() {
                const profileData = State.get('profileData');
                if (!profileData) return;
                
                Elements.followingModalTitle.textContent = `People ${profileData.displayName || 'this user'} follows`;
                Elements.followingList.innerHTML = '<div class="modal-empty"><div class="spinner spinner-sm"></div><p>Loading...</p></div>';
                Elements.followingModal.classList.add('active');
                
                try {
                    const snapshot = await db.collection('followers')
                        .where('followerId', '==', State.get('profileOwner'))
                        .get();
                    
                    if (snapshot.empty) {
                        Elements.followingList.innerHTML = '<div class="modal-empty"><i class="fas fa-user-friends"></i><p>Not following anyone yet</p></div>';
                        return;
                    }
                    
                    const followingIds = snapshot.docs.map(doc => doc.data().followingId);
                    const following = await this.getUserProfiles(followingIds);
                    
                    Elements.followingList.innerHTML = following.map(user => `
                        <div class="modal-user-item" onclick="UserManager.viewProfile('${user.uid}')">
                            <img src="${ProfileManager.getAvatarUrl(user)}" alt="${user.displayName || 'User'}" class="modal-user-avatar">
                            <div class="modal-user-info">
                                <div class="modal-user-name">
                                    ${user.displayName || 'User'}
                                    ${ProfileManager.getBadges(user)}
                                </div>
                                <div class="modal-user-email">${user.email || ''}</div>
                            </div>
                        </div>
                    `).join('');
                    
                } catch (error) {
                    console.error('Error loading following:', error);
                    Elements.followingList.innerHTML = '<div class="modal-empty text-error"><i class="fas fa-exclamation-circle"></i><p>Error loading following</p></div>';
                }
            },
            
            async getUserProfiles(userIds) {
                const profiles = [];
                
                for (let i = 0; i < userIds.length; i += CONFIG.batchSize) {
                    const batch = userIds.slice(i, i + CONFIG.batchSize);
                    const promises = batch.map(id => db.collection('users').doc(id).get());
                    const snapshots = await Promise.all(promises);
                    
                    snapshots.forEach(snap => {
                        if (snap.exists) {
                            profiles.push({ uid: snap.id, ...snap.data() });
                        }
                    });
                }
                
                return profiles;
            }
        };

        // ==================== USER MANAGER ====================
        const UserManager = {
            async loadAllUsers() {
                try {
                    const snapshot = await db.collection('users').get();
                    const users = snapshot.docs.map(doc => ({
                        uid: doc.id,
                        ...doc.data()
                    }));
                    
                    users.sort((a, b) => (b.followersCount || 0) - (a.followersCount || 0));
                    State.set('allUsers', users);
                    
                    console.log(`Loaded ${users.length} users for search`);
                    
                } catch (error) {
                    console.error('Error loading users:', error);
                    State.set('allUsers', []);
                }
            },
            
            viewProfile(userId) {
                window.location.href = `?id=${userId}`;
                Elements.searchResults.classList.remove('show');
                Elements.searchInput.value = '';
            }
        };

        // ==================== SEARCH MANAGER ====================
        const SearchManager = {
            search(query) {
                query = query.trim().toLowerCase();
                
                if (!query || query.length < 2) {
                    Elements.searchResults.classList.remove('show');
                    return;
                }
                
                Elements.searchResults.innerHTML = `
                    <div class="search-loading">
                        <div class="spinner spinner-sm"></div>
                        <p>Searching...</p>
                    </div>
                `;
                Elements.searchResults.classList.add('show');
                
                setTimeout(() => {
                    const results = this.performSearch(query);
                    this.displayResults(results, query);
                }, 100);
            },
            
            performSearch(query) {
                const allUsers = State.get('allUsers');
                const currentUser = State.get('currentUser');
                
                return allUsers
                    .filter(user => {
                        if (!user.isPublic && user.uid !== currentUser?.uid) return false;
                        
                        const searchable = [
                            user.displayName,
                            user.email,
                            user.username
                        ].filter(Boolean).join(' ').toLowerCase();
                        
                        return searchable.includes(query);
                    })
                    .slice(0, CONFIG.maxSearchResults);
            },
            
            displayResults(results, query) {
                if (results.length === 0) {
                    Elements.searchResults.innerHTML = `
                        <div class="search-no-results">
                            <i class="fas fa-search"></i>
                            <p>No users found matching "${query}"</p>
                        </div>
                    `;
                    return;
                }
                
                Elements.searchResults.innerHTML = results.map(user => `
                    <div class="search-result-item" onclick="UserManager.viewProfile('${user.uid}')">
                        <img src="${ProfileManager.getAvatarUrl(user)}" alt="${user.displayName || 'User'}" class="search-result-avatar">
                        <div class="search-result-info">
                            <div class="search-result-name">
                                ${user.displayName || 'Anonymous'}
                                ${ProfileManager.getBadges(user)}
                            </div>
                            <div class="search-result-email">${user.email || ''}</div>
                        </div>
                    </div>
                `).join('');
            }
        };

        // ==================== ADMIN MANAGER ====================
        const AdminManager = {
            async showPanel() {
                const currentUser = State.get('currentUser');
                if (currentUser?.email !== CONFIG.adminEmail) {
                    UIManager.showToast('Admin access required', 'error');
                    return;
                }

                UIManager.showLoading(true);
                UIManager.hideAllSections();
                
                await UserManager.loadAllUsers();
                
                const stats = this.calculateStats();
                
                Elements.contentArea.innerHTML = `
                    <div class="admin-section">
                        <h2 class="section-title">Admin Verification Panel</h2>
                        
                        <div class="admin-stats">
                            <div class="stat-card">
                                <div class="stat-card-value">${stats.total}</div>
                                <div class="stat-card-label">Total Users</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-value">${stats.verified}</div>
                                <div class="stat-card-label">Verified</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-value">${stats.premium}</div>
                                <div class="stat-card-label">Premium</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-value">${stats.activeToday}</div>
                                <div class="stat-card-label">Active Today</div>
                            </div>
                        </div>
                        
                        <div class="admin-filters" id="adminFilters">
                            <button class="filter-btn active" onclick="AdminManager.filterUsers('all')">All Users</button>
                            <button class="filter-btn" onclick="AdminManager.filterUsers('verified')">Verified</button>
                            <button class="filter-btn" onclick="AdminManager.filterUsers('premium')">Premium</button>
                            <button class="filter-btn" onclick="AdminManager.filterUsers('unverified')">Unverified</button>
                        </div>
                        
                        <div class="users-list" id="usersList"></div>
                        
                        <div class="pagination" id="pagination">
                            <button class="pagination-btn" id="prevPage" onclick="AdminManager.changePage('prev')" disabled>
                                <i class="fas fa-chevron-left"></i> Previous
                            </button>
                            <span class="pagination-info" id="pageInfo">Page 1</span>
                            <button class="pagination-btn" id="nextPage" onclick="AdminManager.changePage('next')">
                                Next <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                `;
                
                this.filterUsers('all');
                UIManager.showLoading(false);
            },
            
            calculateStats() {
                const allUsers = State.get('allUsers');
                const today = new Date().toDateString();
                
                return {
                    total: allUsers.length,
                    verified: allUsers.filter(u => u.verified === true || u.verifiedLevel === 'basic').length,
                    premium: allUsers.filter(u => u.verifiedLevel === 'premium').length,
                    activeToday: allUsers.filter(u => {
                        if (!u.lastActive) return false;
                        const lastActive = u.lastActive.seconds ? new Date(u.lastActive.seconds * 1000) : new Date(u.lastActive);
                        return lastActive.toDateString() === today;
                    }).length
                };
            },
            
            filterUsers(filter) {
                State.set('currentFilter', filter);
                
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.textContent.toLowerCase().includes(filter));
                });
                
                const allUsers = State.get('allUsers');
                let filtered = [];
                
                switch (filter) {
                    case 'verified':
                        filtered = allUsers.filter(u => u.verified === true || u.verifiedLevel === 'basic');
                        break;
                    case 'premium':
                        filtered = allUsers.filter(u => u.verifiedLevel === 'premium');
                        break;
                    case 'unverified':
                        filtered = allUsers.filter(u => !u.verified && !u.verifiedLevel);
                        break;
                    default:
                        filtered = [...allUsers];
                }
                
                State.set('filteredUsers', filtered);
                State.set('currentPage', 1);
                this.renderUsers();
            },
            
            renderUsers() {
                const filteredUsers = State.get('filteredUsers');
                const currentPage = State.get('currentPage');
                const start = (currentPage - 1) * CONFIG.usersPerPage;
                const end = start + CONFIG.usersPerPage;
                const paginatedUsers = filteredUsers.slice(start, end);
                const totalPages = Math.ceil(filteredUsers.length / CONFIG.usersPerPage);
                
                document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages || 1}`;
                document.getElementById('prevPage').disabled = currentPage === 1;
                document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;
                
                if (paginatedUsers.length === 0) {
                    document.getElementById('usersList').innerHTML = `
                        <div class="modal-empty">
                            <i class="fas fa-users-slash"></i>
                            <p>No users found</p>
                        </div>
                    `;
                    return;
                }
                
                document.getElementById('usersList').innerHTML = paginatedUsers.map(user => {
                    const level = ProfileManager.getVerificationLevel(user);
                    
                    return `
                        <div class="user-row">
                            <div class="user-row-info">
                                <div class="avatar avatar-lg">
                                    <img src="${ProfileManager.getAvatarUrl(user)}" alt="${user.displayName || 'User'}">
                                </div>
                                <div class="user-row-details">
                                    <div class="user-row-name">
                                        ${user.displayName || 'User'}
                                        ${ProfileManager.getBadges(user)}
                                    </div>
                                    <div class="user-row-email">${user.email || ''}</div>
                                    <div class="user-row-meta">
                                        <span><i class="fas fa-users"></i> ${user.followersCount || 0} followers</span>
                                        <span><i class="fas fa-calendar"></i> Joined ${ProfileManager.formatDate(user.createdAt)}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="user-row-actions">
                                <button class="btn btn-icon btn-secondary" onclick="UserManager.viewProfile('${user.uid}')" title="View Profile">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn btn-icon btn-secondary" onclick="AdminManager.openVerifyModal('${user.uid}', '${user.displayName || 'User'}', '${level}')" title="Manage Verification">
                                    <i class="fas fa-${level === 'premium' ? 'crown' : 'shield-alt'}"></i>
                                </button>
                                ${user.email !== CONFIG.adminEmail ? `
                                    <button class="btn btn-icon btn-error" onclick="AdminManager.openDeleteModal('${user.uid}', '${user.displayName || 'User'}')" title="Delete User">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            },
            
            changePage(direction) {
                const currentPage = State.get('currentPage');
                const filteredUsers = State.get('filteredUsers');
                const totalPages = Math.ceil(filteredUsers.length / CONFIG.usersPerPage);
                
                if (direction === 'prev' && currentPage > 1) {
                    State.set('currentPage', currentPage - 1);
                } else if (direction === 'next' && currentPage < totalPages) {
                    State.set('currentPage', currentPage + 1);
                }
                
                this.renderUsers();
            },
            
            openVerifyModal(userId, userName, currentLevel) {
                State.set('selectedUserId', userId);
                
                Elements.modalUserInfo.innerHTML = `
                    <div class="flex items-center gap-3 p-3">
                        <div class="avatar avatar-lg">
                            <div style="width: 100%; height: 100%; background: var(--gradient-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.5rem;">
                                ${userName.charAt(0).toUpperCase()}
                            </div>
                        </div>
                        <div>
                            <h4>${userName}</h4>
                            <p class="text-tertiary" style="font-size: 0.85rem;">ID: ${userId}</p>
                        </div>
                    </div>
                `;
                
                Elements.verifyLevel.value = currentLevel;
                Elements.verifyNotes.value = '';
                
                Elements.verifyModal.classList.add('active');

            async saveVerification() {
                const userId = State.get('selectedUserId');
                if (!userId) return;
                
                const level = Elements.verifyLevel.value;
                const notes = Elements.verifyNotes.value;
                
                try {
                    await db.collection('users').doc(userId).update({
                        verifiedLevel: level === 'none' ? null : level,
                        verified: level !== 'none',
                        verifiedAt: level !== 'none' ? firebase.firestore.FieldValue.serverTimestamp() : null,
                        verifiedBy: level !== 'none' ? CONFIG.adminEmail : null,
                        verificationNotes: notes || null,
                        premiumVerified: level === 'premium',
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    UIManager.showToast(`User ${level === 'premium' ? 'Premium Verified' : level === 'basic' ? 'Verified' : 'Unverified'} successfully!`);
                    
                    // Refresh admin panel if open
                    if (Elements.contentArea.querySelector('.admin-section')) {
                        await UserManager.loadAllUsers();
                        this.filterUsers(State.get('currentFilter'));
                    }
                    
                    // Refresh profile if viewing this user
                    if (State.get('profileData')?.uid === userId) {
                        const doc = await db.collection('users').doc(userId).get();
                        State.set('profileData', { uid: doc.id, ...doc.data() });
                        ProfileManager.renderProfile(State.get('profileData'));

                    UIManager.closeModal('verifyModal');

                    console.error('Error updating verification:', error);
                    UIManager.showToast('Error updating verification', 'error');

            async confirmDelete() {

                    if (Elements.contentArea.querySelector('.admin-section')) {
                        await UserManager.loadAllUsers();
                        this.filterUsers(State.get('currentFilter'));

                    UIManager.closeModal('deleteModal');
                    
                } catch (error) {
                    console.error('Error deleting user:', error);
                    UIManager.showToast('Error deleting user', 'error');
                }
            }

        // ==================== AVATAR MANAGER ====================
        const AvatarManager = {
            handleUpload() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => this.upload(e.target.files[0]);
                input.click();
            },
            
            async upload(file) {
                const currentUser = State.get('currentUser');
                if (!currentUser) return;
                
                if (!file) return;
                
                if (file.size > CONFIG.maxAvatarSize) {
                    UIManager.showToast('Image must be less than 5MB', 'error');
                    return;
                }
                
                if (!file.type.startsWith('image/')) {
                    UIManager.showToast('Please select an image file', 'error');
                    return;
                }
                
                UIManager.showToast('Uploading...', 'info');
                
                try {
                    // Convert to base64 for demo (use Cloudinary in production)
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        await db.collection('users').doc(currentUser.uid).update({
                            photoURL: reader.result,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        
                        UIManager.showToast('Profile picture updated!', 'success');
                        
                        // Refresh profile if viewing
                        if (State.get('profileData')?.uid === currentUser.uid) {
                            const doc = await db.collection('users').doc(currentUser.uid).get();
                            State.set('profileData', { uid: doc.id, ...doc.data() });
                            ProfileManager.renderProfile(State.get('profileData'));
                        }
                    };
                    reader.readAsDataURL(file);
                    
                } catch (error) {
                    console.error('Error uploading avatar:', error);
                    UIManager.showToast('Error uploading image', 'error');
                }
            }
        };

        // ==================== PRIVACY MANAGER ====================
        const PrivacyManager = {
            async togglePrivacy() {
                if (!State.get('isOwner') || !State.get('profileData')) return;
                
                try {
                    const newStatus = !State.get('profileData').isPublic;
                    
                    await db.collection('users').doc(State.get('profileData').uid).update({
                        isPublic: newStatus,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    State.get('profileData').isPublic = newStatus;
                    ProfileManager.renderProfile(State.get('profileData'));
                    
                    UIManager.showToast(`Profile is now ${newStatus ? 'public' : 'private'}`);
                    
                } catch (error) {
                    console.error('Error toggling privacy:', error);
                    UIManager.showToast('Error updating privacy', 'error');
                }

                if (!show) Elements.mainContent.style.display = 'block';
            },
            
            hideAllSections() {
                Elements.contentArea.innerHTML = '';
            },
            
            showLanding() {
                Elements.contentArea.innerHTML = `
                    <div class="card text-center p-8">
                        <i class="fas fa-users" style="font-size: 5rem; color: var(--primary-500); margin-bottom: var(--space-6);"></i>
                        <h2 class="mb-4">Welcome to Reverbit</h2>
                        <p class="text-secondary mb-6" style="max-width: 500px; margin-left: auto; margin-right: auto;">
                            Sign in to view your profile, connect with others, and grow your network.
                        </p>
                        <div class="flex gap-3 justify-center">
                            <a href="https://aditya-cmd-max.github.io/signin" class="btn btn-primary">Sign In</a>
                            <a href="https://aditya-cmd-max.github.io/signup" class="btn btn-secondary">Sign Up</a>
                        </div>
                    </div>
                `;
            },
            
            showNotFound(message = 'Profile not found') {
                Elements.contentArea.innerHTML = `
                    <div class="not-found">
                        <i class="fas fa-user-slash not-found-icon"></i>
                        <h2 class="not-found-title">Profile Not Found</h2>
                        <p class="not-found-text">${message}</p>
                        <div class="flex gap-3 justify-center">
                            <a href="#" class="btn btn-primary" onclick="window.location.reload()">Go Home</a>
                            <a href="#" class="btn btn-secondary" onclick="UserManager.viewProfile('${State.get('currentUser')?.uid}')">Your Profile</a>
                        </div>
                    </div>
                `;
            },
            
            showToast(message, type = 'success') {
                if (State.get('toastTimeout')) {
                    clearTimeout(State.get('toastTimeout'));
                }
                
                Elements.toast.className = `toast toast-${type}`;
                Elements.toastMessage.textContent = message;
                Elements.toast.classList.add('show');
                
                const timeout = setTimeout(() => {
                    Elements.toast.classList.remove('show');
                }, 3000);
                
                State.set('toastTimeout', timeout);
            },
            
            closeToast() {
                if (State.get('toastTimeout')) {
                    clearTimeout(State.get('toastTimeout'));
                }
                Elements.toast.classList.remove('show');
            },
            
            closeModal(modalId) {
                document.getElementById(modalId).classList.remove('active');
            },
            
            updateNavigation() {
                const currentUser = State.get('currentUser');
                const isAdmin = currentUser?.email === CONFIG.adminEmail;
                
                Elements.nav.innerHTML = `
                    <button class="btn btn-icon btn-secondary" id="themeToggle" onclick="ThemeManager.toggle()" title="Toggle theme">
                        <i class="fas fa-${State.get('theme') === 'dark' ? 'sun' : 'moon'}"></i>
                    </button>
                    ${currentUser ? `
                        <a href="?id=${currentUser.uid}" class="btn btn-primary hide-sm">
                            <i class="fas fa-user"></i> Profile
                        </a>
                        ${isAdmin ? `
                            <button class="btn btn-secondary hide-sm" onclick="AdminManager.showPanel()">
                                <i class="fas fa-shield-alt"></i> Admin
                            </button>
                        ` : ''}
                        <button class="btn btn-secondary" onclick="AuthManager.logout()" title="Logout">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    ` : `
                        <a href="https://aditya-cmd-max.github.io/signin" class="btn btn-secondary">Sign In</a>
                        <a href="https://aditya-cmd-max.github.io/signup" class="btn btn-primary">Sign Up</a>
                    `}
                `;
            }
        };

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Reverbit Profile initializing...');
            
            ThemeManager.init();
            
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
            
            // Load all users for search
            await UserManager.loadAllUsers();
            
            // Initialize auth
            await AuthManager.init();

            // Search input handler
            Elements.searchInput.addEventListener('input', (e) => {
                clearTimeout(State.get('searchTimeout'));
                const timeout = setTimeout(() => {
                    SearchManager.search(e.target.value);
                }, CONFIG.searchDebounceMs);
                State.set('searchTimeout', timeout);
            });

            // Close search on outside click
            document.addEventListener('click', (e) => {
                if (!Elements.searchResults.contains(e.target) && !Elements.searchInput.contains(e.target)) {
                    Elements.searchResults.classList.remove('show');
                }
            });

            console.log('✅ Reverbit Profile initialized');
        });

        // ==================== EXPOSE GLOBALLY ====================
        window.ThemeManager = ThemeManager;
        window.AuthManager = AuthManager;
        window.ProfileManager = ProfileManager;
        window.FollowManager = FollowManager;
        window.UserManager = UserManager;
        window.AdminManager = AdminManager;
        window.AvatarManager = AvatarManager;
        window.PrivacyManager = PrivacyManager;
        window.ShareManager = ShareManager;
        window.UIManager = UIManager;
        window.closeModal = UIManager.closeModal.bind(UIManager);
        window.closeToast = UIManager.closeToast.bind(UIManager);
    </script>
</body>
</html>
